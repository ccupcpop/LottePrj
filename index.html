// ============================================================
// 版路觀察 Tab (tab2)
// 功能1: 近N3中1 (PurePositionAnalyzer)
// 功能2: DragNumber (DragNumberAnalyzer)
// ============================================================

// ----------- 工具函數 -----------
function combinations(arr, k) {
  const result = [];
  function helper(start, cur) {
    if (cur.length === k) { result.push([...cur]); return; }
    for (let i = start; i < arr.length; i++) {
      cur.push(arr[i]);
      helper(i + 1, cur);
      cur.pop();
    }
  }
  helper(0, []);
  return result;
}

// ----------- 近N3中1: PurePositionAnalyzer -----------
function runPositionAnalysis(days, minSingle, minDouble, minTriple) {
  // Use interestedIndex as upper bound (exclusive): only use records[0..interestedIndex-1]
  const N = interestedIndex; // C# equivalent: dataList.Count limited to selected period
  if (N < 10) return { results: [], log: '資料不足' };

  // 取最近 days 天的 record indices (within [0..N-1])
  const allDates = [...new Set(records.slice(0, N).map(r => r.date))].sort();
  const recentDates = new Set(allDates.slice(-days));

  // numberList: { num, pos(1-based), idx, date }
  const numberList = [];
  let latestIdx = -1;
  for (let i = 0; i < N; i++) {
    if (!recentDates.has(records[i].date)) continue;
    for (let pos = 0; pos < DEFINE_NUMBER; pos++) {
      numberList.push({ num: records[i].nums[pos], pos: pos + 1, idx: i, date: records[i].date });
    }
    if (i > latestIdx) latestIdx = i;
  }

  if (latestIdx < 1) return { results: [], log: '資料不足' };
  const startIdx = latestIdx - 1;

  // 去重觸發條件
  const triggerMap = new Map();
  for (const e of numberList) {
    const key = `${e.num}_${e.pos}_${e.idx}`;
    if (!triggerMap.has(key)) triggerMap.set(key, e);
  }
  const uniqueList = [...triggerMap.values()];

  // 收集所有不重複號碼作為目標球
  const allNumbers = [...new Set(numberList.map(e => e.num))].sort((a,b) => a-b);

  // CheckAlreadySuccess: 觸發球在最近3期後是否已命中目標
  function checkAlreadySuccess(triggerNum, triggerPos, triggerIdx, targetNums) {
    for (let offset = 1; offset <= 3; offset++) {
      const ci = triggerIdx + offset;
      if (ci > latestIdx || ci >= N) break;
      const cn = records[ci].nums;
      if (targetNums.some(t => cn.includes(t))) return true;
    }
    return false;
  }

  // CountConsecutive: 從 startIdx 往回，找 triggerNum 在 triggerPos-1 位置，
  //   看後 lookAhead 期內是否含 targetNums 任一
  function countConsecutive(triggerNum, triggerPos, targetNums, lookAhead) {
    let count = 0;
    const recList = [];
    let idx = startIdx;
    while (idx >= 0) {
      const curNums = records[idx].nums;
      if (curNums[triggerPos - 1] !== triggerNum) { idx--; continue; }

      let found = false;
      let foundInfo = null;
      for (let offset = 1; offset <= lookAhead; offset++) {
        const ci = idx + offset;
        if (ci >= N) break;
        const cn = records[ci].nums;
        for (const t of targetNums) {
          if (cn.includes(t)) {
            found = true;
            foundInfo = { offset, targetNum: t, date: records[ci].date };
            break;
          }
        }
        if (found) break;
      }

      if (found) {
        count++;
        recList.push({ date: records[idx].date, status: '成功', found: foundInfo });
        idx--;
      } else {
        recList.push({ date: records[idx].date, status: '失敗' });
        break;
      }
    }
    return { count, records: recList };
  }

  const results = [];
  let filteredCount = 0;

  for (const trigger of uniqueList) {
    const { num: triggerNum, pos: triggerPos, idx: triggerIdx } = trigger;

    // 單球
    for (const target of allNumbers) {
      if (target === triggerNum) continue;
      const targetList = [target];
      if (checkAlreadySuccess(triggerNum, triggerPos, triggerIdx, targetList)) { filteredCount++; continue; }
      const cr = countConsecutive(triggerNum, triggerPos, targetList, 3);
      if (cr.count >= minSingle) {
        results.push({ type: '單球', triggerNum, triggerPos, targets: targetList, count: cr.count, recs: cr.records });
      }
    }

    // 雙球
    for (const combo of combinations(allNumbers, 2)) {
      if (combo.includes(triggerNum)) continue;
      if (checkAlreadySuccess(triggerNum, triggerPos, triggerIdx, combo)) { filteredCount++; continue; }
      const cr = countConsecutive(triggerNum, triggerPos, combo, 3);
      if (cr.count >= minDouble) {
        results.push({ type: '雙球', triggerNum, triggerPos, targets: combo, count: cr.count, recs: cr.records });
      }
    }

    // 三球
    for (const combo of combinations(allNumbers, 3)) {
      if (combo.includes(triggerNum)) continue;
      if (checkAlreadySuccess(triggerNum, triggerPos, triggerIdx, combo)) { filteredCount++; continue; }
      const cr = countConsecutive(triggerNum, triggerPos, combo, 3);
      if (cr.count >= minTriple) {
        results.push({ type: '三球', triggerNum, triggerPos, targets: combo, count: cr.count, recs: cr.records });
      }
    }
  }

  // 排序: 三球>雙球>單球, 同類按連續次數降序
  const typeOrder = { '三球': 0, '雙球': 1, '單球': 2 };
  results.sort((a, b) => {
    const oa = typeOrder[a.type], ob = typeOrder[b.type];
    if (oa !== ob) return oa - ob;
    return b.count - a.count;
  });

  // 目標球出現次數統計
  const targetCount = {};
  for (const r of results) {
    const tk = `${r.triggerNum}_${r.triggerPos}`;
    for (const t of r.targets) {
      if (!targetCount[t]) targetCount[t] = new Set();
      targetCount[t].add(tk);
    }
  }
  const targetStats = Object.entries(targetCount)
    .map(([num, set]) => ({ num: +num, count: set.size }))
    .sort((a, b) => b.count - a.count || a.num - b.num);

  return { results, filteredCount, targetStats, uniqueCount: uniqueList.length, allNumbers };
}

// ----------- DragNumber: DragNumberAnalyzer -----------
function runDragNumberAnalysis(daysBack, useOccurrenceLimit, maxOccurrences, threshold, validatePosition, triggerCount) {
  const N = interestedIndex; // limit to selected period
  // Find last valid index within [0..N-1]
  let lastValidIdx = N - 1;
  while (lastValidIdx >= 0 && !records[lastValidIdx].date) lastValidIdx--;
  if (lastValidIdx < triggerCount) return null;

  const lastNIndices = [];
  for (let i = lastValidIdx - triggerCount + 1; i <= lastValidIdx; i++) lastNIndices.push(i);

  // globalStats[num] = total count across all triggers
  const globalNumberCounter = {};
  const globalTailCounter = {};

  // numSourceMap[num][srcLabel] = [{ triggerNum, datePairs[] }]
  const numSourceMap = {};

  const triggerResults = []; // per trigger

  for (let triggerI = triggerCount - 1; triggerI >= 0; triggerI--) {
    const triggerGlobalIdx = lastNIndices[triggerI];
    const periodsAhead = triggerCount - triggerI;
    const triggerLabelNum = triggerCount - triggerI;
    const triggerNums = records[triggerGlobalIdx].nums;

    const posResults = [];

    for (let pos = 0; pos < DEFINE_NUMBER; pos++) {
      const triggerNum = triggerNums[pos];
      const srcLabel = `#${triggerLabelNum}-${pos + 1}`;

      const allNextNums = [];
      let matchCount = 0;
      let occurrenceCount = 0;
      const matchRecords = [];

      const searchStart = triggerGlobalIdx - 1;
      const searchEnd = useOccurrenceLimit ? 0 : Math.max(0, triggerGlobalIdx - daysBack);

      for (let i = searchStart; i >= searchEnd; i--) {
        if (i + periodsAhead >= N) continue;
        if (!records[i].date) continue;

        const curNums = records[i].nums;
        let isMatch = false;
        if (validatePosition) {
          isMatch = curNums[pos] === triggerNum;
        } else {
          isMatch = curNums.includes(triggerNum);
        }
        if (!isMatch) continue;

        if (useOccurrenceLimit && occurrenceCount >= maxOccurrences) break;

        matchCount++;
        occurrenceCount++;

        const nextIdx = i + periodsAhead;
        if (nextIdx >= N || !records[nextIdx].date) continue;

        const nextNums = records[nextIdx].nums;
        for (const n of nextNums) {
          allNextNums.push(n);
          const key = `${srcLabel}|${triggerNum}`;
          if (!numSourceMap[n]) numSourceMap[n] = {};
          if (!numSourceMap[n][key]) numSourceMap[n][key] = { srcLabel, triggerNum, pairs: [] };
          numSourceMap[n][key].pairs.push({
            fromDate: records[i].date, fromNums: [...curNums],
            toDate: records[nextIdx].date, toNums: [...nextNums]
          });
        }

        matchRecords.push({
          occ: occurrenceCount,
          fromDate: records[i].date, fromNums: [...curNums],
          periodsAhead,
          toDate: records[nextIdx].date, toNums: [...nextNums]
        });
      }

      // Count frequencies
      const counter = {};
      for (const n of allNextNums) { counter[n] = (counter[n] || 0) + 1; }

      const filtered = Object.entries(counter)
        .filter(([,cnt]) => cnt > threshold)
        .map(([num, cnt]) => ({ num: +num, cnt }))
        .sort((a, b) => b.cnt - a.cnt || a.num - b.num);

      for (const { num, cnt } of filtered) {
        globalNumberCounter[num] = (globalNumberCounter[num] || 0) + cnt;
        const tail = num % 10;
        globalTailCounter[tail] = (globalTailCounter[tail] || 0) + cnt;
      }

      posResults.push({ pos: pos + 1, triggerNum, matchCount, matchRecords, filtered, srcLabel });
    }

    triggerResults.push({
      labelNum: triggerLabelNum, globalIdx: triggerGlobalIdx,
      date: records[triggerGlobalIdx].date,
      periodsAhead, nums: triggerNums, posResults
    });
  }

  // Global stats sorted
  const globalNumsSorted = Object.entries(globalNumberCounter)
    .map(([num, cnt]) => ({ num: +num, cnt }))
    .sort((a, b) => b.cnt - a.cnt || a.num - b.num);

  const globalTailsSorted = Object.entries(globalTailCounter)
    .map(([tail, cnt]) => ({ tail: +tail, cnt }))
    .sort((a, b) => b.cnt - a.cnt || a.tail - b.tail);

  return { triggerResults, numSourceMap, globalNumsSorted, globalTailsSorted };
}

// ----------- 版路觀察 Tab 渲染 -----------
function buildObserveTabShell(mode, posFixed) {
  return `
  <div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--panel2);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap">
    <button onclick="setObserveMode('near3')" id="btnNear3" style="padding:3px 12px;border-radius:4px;font-size:12px;border:1px solid var(--border);cursor:pointer;
      background:${mode==='near3'?'var(--accent)':'var(--panel)'};color:${mode==='near3'?'#fff':'var(--text-dim)'}">近N3中1</button>
    <button onclick="setObserveMode('drag')" id="btnDrag" style="padding:3px 12px;border-radius:4px;font-size:12px;border:1px solid var(--border);cursor:pointer;
      background:${mode==='drag'?'var(--accent)':'var(--panel)'};color:${mode==='drag'?'#fff':'var(--text-dim)'}">DragNumber</button>
    <label style="font-size:12px;color:var(--text-dim);display:flex;align-items:center;gap:4px">
      <input type="checkbox" id="observePosFixed" ${posFixed?'checked':''} onchange="renderObserveTab()"> 定位
    </label>
    <span id="observeStatus" style="font-size:11px;color:var(--text-muted);margin-left:auto"></span>
  </div>
  <div id="observeContent" style="flex:1;overflow-y:auto;padding:8px 10px;font-size:12px">
    <div style="color:var(--text-muted);text-align:center;padding:20px">計算中...</div>
  </div>`;
}

let observeMode = 'near3';

function setObserveMode(mode) {
  observeMode = mode;
  renderObserveTab();
}

function renderObserveTab() {
  const container = document.getElementById('tab2');
  if (!container) return;
  const posFixed = document.getElementById('observePosFixed')?.checked ?? false;
  const mode = observeMode;
  container.innerHTML = buildObserveTabShell(mode, posFixed);
  container.style.display = 'flex';
  container.style.flexDirection = 'column';
  renderObserveResults(mode, posFixed);
}

function renderObserveResults(mode, posFixed) {
  const content = document.getElementById('observeContent');
  const status = document.getElementById('observeStatus');
  if (!content) return;
  setTimeout(() => {
    try {
      if (mode === 'near3') {
        renderNear3Results(content, status, posFixed);
      } else {
        renderDragResults(content, status, posFixed);
      }
    } catch(e) {
      content.innerHTML = `<div style="color:#e05252">錯誤: ${e.message}<br>${e.stack}</div>`;
    }
  }, 30);
}

function renderNear3Results(content, status, posFixed) {
  // days=3, minSingle=3, minDouble=5, minTriple=10
  const days = 3;
  const { results, filteredCount, targetStats, uniqueCount, allNumbers } = runPositionAnalysis(days, 3, 5, 10);

  if (status) status.textContent = `共 ${results.length} 個模式 (已過濾 ${filteredCount} 個)`;

  // Use interestedIndex to compute recent dates (matches runPositionAnalysis)
  const allDates = [...new Set(records.slice(0, interestedIndex).map(r => r.date))].sort();
  const recentDates = allDates.slice(-days);

  // Recent N days info
  let html = `<div style="color:var(--accent2);margin-bottom:4px">連續成功分析 - 純精確排序位置</div>`;
  html += `<div style="color:var(--text-muted);font-size:11px">門檻設定: 單球≥3 | 雙球≥5 | 三球≥10</div>`;
  html += `<div style="color:var(--text-muted);font-size:11px;margin-bottom:8px">最近 ${days} 天觸發條件: ${uniqueCount} 個 | 目標球: ${allNumbers.length} 個 | 已過濾: ${filteredCount} 個</div>`;

  // Recent dates summary
  html += `<div style="background:var(--panel2);border:1px solid var(--border);border-radius:4px;padding:6px 8px;margin-bottom:8px;font-size:11px">`;
  for (const date of recentDates) {
    const recs = records.slice(0, interestedIndex).filter(r => r.date === date);
    for (const rec of recs) {
      html += `<div style="color:var(--text-dim)">${rec.date}: ${rec.nums.map((n,i) => `排序${i+1}=${String(n).padStart(2,'0')}`).join(' | ')}</div>`;
    }
  }
  html += `</div>`;

  if (results.length === 0) {
    html += `<div style="color:var(--text-muted);padding:10px">未找到符合門檻的模式</div>`;
    content.innerHTML = html;
    return;
  }

  // Results table
  const singleC = results.filter(r=>r.type==='單球').length;
  const doubleC = results.filter(r=>r.type==='雙球').length;
  const tripleC = results.filter(r=>r.type==='三球').length;
  html += `<div style="color:var(--gold);margin-bottom:6px;font-size:11px">完整模式列表 (共 ${results.length} 個) | 門檻: 單球≥3次(${singleC}個) | 雙球≥5次(${doubleC}個) | 三球≥10次(${tripleC}個)</div>`;

  html += `<table style="width:100%;border-collapse:collapse;font-size:11px;margin-bottom:12px">
    <thead>
      <tr style="background:var(--panel2);color:var(--text-dim)">
        <th style="padding:3px 6px;text-align:left">#</th>
        <th style="padding:3px 6px;text-align:left">類型</th>
        <th style="padding:3px 6px;text-align:left">觸發球</th>
        <th style="padding:3px 6px;text-align:left">位置</th>
        <th style="padding:3px 6px;text-align:left">目標球</th>
        <th style="padding:3px 6px;text-align:right">連續</th>
      </tr>
    </thead><tbody>`;

  const typeColor = { '三球': '#48bb78', '雙球': '#e8a020', '單球': '#3a7bd5' };
  for (let i = 0; i < results.length; i++) {
    const r = results[i];
    const tc = typeColor[r.type] || '#aaa';
    const targetStr = r.targets.map(t => String(t).padStart(2,'0')).join('/');
    const rowBg = i % 2 === 0 ? '' : 'background:var(--panel2)';
    html += `<tr style="${rowBg}">
      <td style="padding:2px 6px;color:var(--text-muted)">${i+1}</td>
      <td style="padding:2px 6px;color:${tc};font-weight:600">${r.type}</td>
      <td style="padding:2px 6px;color:var(--gold)">${String(r.triggerNum).padStart(2,'0')}</td>
      <td style="padding:2px 6px;color:var(--text-dim)">排序${r.triggerPos}</td>
      <td style="padding:2px 6px;color:var(--text)">${targetStr}</td>
      <td style="padding:2px 6px;text-align:right;color:var(--accent2);font-weight:700">${r.count}</td>
    </tr>`;
  }
  html += `</tbody></table>`;

  // Target stats
  html += `<div style="color:var(--accent2);margin-bottom:4px">目標球出現次數統計</div>`;
  html += `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">`;
  for (const { num, count } of targetStats) {
    const intensity = Math.min(count * 20, 100);
    html += `<span style="padding:2px 8px;background:rgba(58,123,213,${intensity/100*0.6+0.1});border:1px solid var(--border);border-radius:3px;font-size:11px;color:var(--text)">
      <b style="color:var(--gold)">${String(num).padStart(2,'0')}</b> <span style="color:var(--text-dim)">${count}次</span>
    </span>`;
  }
  html += `</div>`;

  content.innerHTML = html;
}

function renderDragResults(content, status, posFixed) {
  // triggerCount=3, maxOccurrences=4, threshold=1 (matching the example output)
  const result = runDragNumberAnalysis(30, true, 4, 1, posFixed, 3);
  if (!result) {
    content.innerHTML = '<div style="color:var(--text-muted)">資料不足</div>';
    return;
  }

  const { triggerResults, numSourceMap, globalNumsSorted, globalTailsSorted } = result;
  const maxGlobal = globalNumsSorted.length > 0 ? globalNumsSorted[0].cnt : 1;

  if (status) status.textContent = `${posFixed?'定位':'不定位'} | 前4次出現 | 門檻>1`;

  let html = '';

  // ── 觸發條件標頭 ───────────────────────────────────────────
  html += `<div style="background:var(--panel2);border:1px solid var(--border);border-radius:4px;padding:8px 10px;margin-bottom:10px;font-size:11px">`;
  html += `<div style="color:var(--gold);font-weight:600;margin-bottom:6px">最後${triggerResults.length}筆數據作為觸發條件</div>`;
  for (const tr of [...triggerResults].reverse()) {
    const numsStr = tr.nums.map((n,i)=>`排序${i+1}=<b style="color:var(--accent2)">${String(n).padStart(2,'0')}</b>`).join('　');
    html += `<div style="margin-bottom:2px;font-size:11px"><span style="color:var(--text-muted)">倒數第${tr.labelNum}筆 (${tr.date}):</span> ${numsStr}</div>`;
  }
  html += `<div style="margin-top:4px;font-size:10px;color:var(--text-muted)">${posFixed?'資料有效性檢查: 驗證排序位置':'資料有效性檢查: 不驗證位置'}</div>`;
  html += `</div>`;

  // ── 各觸發條件詳細結果 ─────────────────────────────────────
  for (const tr of triggerResults) {
    html += `<div style="background:var(--panel2);border:1px solid var(--border);border-radius:4px;margin-bottom:10px;overflow:hidden">`;
    // 觸發條件標題
    html += `<div style="padding:6px 10px;background:rgba(58,123,213,0.15);border-bottom:1px solid var(--border)">
      <span style="color:var(--gold);font-weight:600">觸發條件 #${tr.labelNum}</span>
      <span style="color:var(--text-muted);font-size:11px;margin-left:8px">倒數第${tr.labelNum}筆　${tr.date}　找下 <b style="color:var(--accent2)">${tr.periodsAhead}</b> 期　搜尋範圍: 前4次出現　門檻: >1</span>
    </div>`;

    for (const pr of tr.posResults) {
      html += `<div style="border-bottom:1px solid var(--border);padding:6px 10px">`;
      // 排序標題
      html += `<div style="margin-bottom:4px">
        <span style="color:var(--text-dim);font-size:11px">排序${pr.pos}</span>
        <span style="color:var(--accent2);font-size:13px;font-weight:700;margin-left:6px">${String(pr.triggerNum).padStart(2,'0')}</span>
        <span style="color:var(--text-muted);font-size:10px;margin-left:8px">匹配 ${pr.matchCount} 次</span>
      </div>`;

      if (pr.matchRecords.length > 0) {
        // 匹配記錄
        html += `<div style="margin-bottom:6px">`;
        html += `<div style="color:var(--text-muted);font-size:10px;margin-bottom:2px">匹配記錄:</div>`;
        for (const rec of pr.matchRecords) {
          const fromNums = rec.fromNums.map(n=>String(n).padStart(2,'0')).join(', ');
          const toNums   = rec.toNums.map(n=>String(n).padStart(2,'0')).join(', ');
          html += `<div style="font-size:10px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;padding:1px 0">
            <span style="color:var(--text-muted)">第${rec.occ}次:</span>
            ${rec.fromDate} [${fromNums}]
            <span style="color:var(--text-muted)">→ 下${rec.periodsAhead}期</span>
            ${rec.toDate} [<span style="color:var(--gold)">${toNums}</span>]
          </div>`;
        }
        html += `</div>`;
      }

      // 下期號碼出現次數
      if (pr.filtered.length > 0) {
        html += `<div style="color:var(--text-muted);font-size:10px;margin-bottom:3px">下期號碼出現次數 (>1)：</div>`;
        html += `<div style="display:flex;flex-wrap:wrap;gap:4px">`;
        const maxCnt = Math.max(...pr.filtered.map(f=>f.cnt));
        for (const { num, cnt } of pr.filtered) {
          const barLen = cnt;
          const bar = '█'.repeat(barLen);
          const alpha = 0.2 + (cnt / maxCnt) * 0.5;
          html += `<div style="display:flex;align-items:center;gap:4px;background:transparent;border:1px solid var(--border);border-radius:3px;padding:2px 7px;font-size:11px">
            <span style="color:var(--gold);font-weight:700;font-family:'JetBrains Mono',monospace">${String(num).padStart(2,'0')}</span>
            <span style="color:var(--text-muted);font-size:10px">${cnt}次</span>
            <span style="color:rgba(232,160,32,0.9);font-size:9px;letter-spacing:-1px">${bar}</span>
          </div>`;
        }
        html += `</div>`;
      } else {
        html += `<div style="color:var(--text-muted);font-size:10px">(沒有號碼出現次數 > 1)</div>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  }

  // ── 號碼主軸統計 ───────────────────────────────────────────
  // Build by tail order: 1,11,21,31 → 2,12,22,32 → ... → 10,20,30
  const tailOrder = [];
  for (let tail = 1; tail <= 10; tail++) {
    const digit = tail % 10;
    for (let n = digit === 0 ? 10 : digit; n <= 39; n += 10) tailOrder.push(n);
  }
  const numSourceEntries = tailOrder.filter(n => numSourceMap[n]);

  if (numSourceEntries.length > 0) {
    html += `<div style="background:var(--panel2);border:1px solid var(--border);border-radius:4px;margin-bottom:10px">`;
    html += `<div style="padding:6px 10px;border-bottom:1px solid var(--border);color:var(--gold);font-weight:600;font-size:12px">號碼主軸統計</div>`;
    for (const num of numSourceEntries) {
      const srcMap = numSourceMap[num];
      let total = 0;
      for (const k of Object.keys(srcMap)) total += srcMap[k].pairs.length;
      const bar = '█'.repeat(Math.min(total, 30));
      const alpha = 0.1 + Math.min(total / maxGlobal, 1) * 0.5;

      html += `<div style="border-bottom:1px solid rgba(255,255,255,0.05);padding:5px 10px">`;
      html += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">
        <span style="font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent2);font-size:13px">${String(num).padStart(2,'0')}</span>
        <span style="color:var(--text-muted);font-size:11px">${total} 次</span>
        <span style="color:rgba(232,160,32,0.7);font-size:9px;letter-spacing:-1px">${bar}</span>
      </div>`;

      // Sources sorted by label
      const keys = Object.keys(srcMap).sort();
      for (const k of keys) {
        const { srcLabel, triggerNum, pairs } = srcMap[k];
        html += `<div style="margin-left:12px;margin-bottom:2px">
          <span style="color:var(--text-dim);font-size:10px;font-family:'JetBrains Mono',monospace">${srcLabel} 號碼${String(triggerNum).padStart(2,'0')} 來源:</span>
        </div>`;
        for (const p of pairs) {
          const fn = p.fromNums.map(n=>String(n).padStart(2,'0')).join(',');
          const tn = p.toNums.map(n=>String(n).padStart(2,'0')).join(',');
          html += `<div style="margin-left:24px;font-size:10px;color:var(--text-muted);font-family:'JetBrains Mono',monospace;padding:1px 0">
            當期${p.fromDate}[${fn}]→結果${p.toDate}[<span style="color:var(--gold)">${tn}</span>]
          </div>`;
        }
      }
      html += `</div>`;
    }
    html += `</div>`;
  }

  // ── 全局號碼統計總結 ───────────────────────────────────────
  if (globalNumsSorted.length > 0) {
    html += `<div style="background:var(--panel2);border:1px solid var(--border);border-radius:4px;margin-bottom:10px">`;
    html += `<div style="padding:6px 10px;border-bottom:1px solid var(--border);color:var(--gold);font-weight:600;font-size:12px">全局號碼統計總結</div>`;
    html += `<div style="padding:6px 10px;display:flex;flex-wrap:wrap;gap:4px">`;
    for (const { num, cnt } of globalNumsSorted) {
      const alpha = 0.15 + (cnt / maxGlobal) * 0.65;
      const bar = '█'.repeat(Math.min(cnt, 20));
      html += `<div style="background:rgba(72,187,120,${alpha});border:1px solid rgba(72,187,120,0.4);border-radius:3px;padding:2px 8px;font-size:11px;display:flex;align-items:center;gap:5px">
        <b style="color:#6ee7b7;font-family:'JetBrains Mono',monospace">${String(num).padStart(2,'0')}</b>
        <span style="color:var(--text-muted);font-size:10px">${cnt}次</span>
        <span style="color:rgba(72,187,120,0.8);font-size:9px;letter-spacing:-1px">${bar}</span>
      </div>`;
    }
    html += `</div></div>`;
  }

  // ── 全局尾數統計 ───────────────────────────────────────────
  if (globalTailsSorted.length > 0) {
    const maxTail = globalTailsSorted[0].cnt;
    html += `<div style="background:var(--panel2);border:1px solid var(--border);border-radius:4px;margin-bottom:10px">`;
    html += `<div style="padding:6px 10px;border-bottom:1px solid var(--border);color:var(--gold);font-weight:600;font-size:12px">全局尾數統計</div>`;
    html += `<div style="padding:6px 10px;display:flex;flex-wrap:wrap;gap:4px">`;
    for (const { tail, cnt } of globalTailsSorted) {
      const alpha = 0.2 + (cnt / maxTail) * 0.6;
      const bar = '█'.repeat(Math.min(cnt, 30));
      html += `<div style="background:rgba(155,89,182,${alpha});border:1px solid rgba(155,89,182,0.4);border-radius:3px;padding:2px 10px;font-size:11px;display:flex;align-items:center;gap:5px">
        <b style="color:#c4b5fd">${tail}尾</b>
        <span style="color:var(--text-muted);font-size:10px">${cnt}次</span>
        <span style="color:rgba(155,89,182,0.9);font-size:9px;letter-spacing:-1px">${bar}</span>
      </div>`;
    }
    html += `</div></div>`;
  }

  content.innerHTML = html;
}


// ============================================================
// 遺漏表 (tab3) - 對應 C# button_歷史期距_Click + button2_Click
// ============================================================

// 預計算每一期開獎時各球的遺漏數（開獎前連續缺席幾期）
// returns missingAt[i][b] = 第i期開獎"時"，球b已連續缺席幾期
function computeAllMissing() {
  const N = records.length;
  const lastSeen = new Int32Array(40).fill(-1); // ball 1..39
  const missingAt = new Array(N);
  for (let i = 0; i < N; i++) {
    const m = new Int16Array(40);
    for (let b = 1; b <= 39; b++) {
      m[b] = lastSeen[b] < 0 ? i : (i - lastSeen[b] - 1);
    }
    missingAt[i] = m;
    for (const n of records[i].nums) {
      if (n >= 1 && n <= 39) lastSeen[n] = i;
    }
  }
  return missingAt;
}

// 計算 interestedIndex 時刻各球的當前遺漏數（還沒開獎）
function computeCurrentMissing() {
  const N = interestedIndex; // only use records[0..N-1]
  const lastSeen = new Int32Array(40).fill(-1);
  for (let i = 0; i < N; i++) {
    for (const n of records[i].nums) {
      if (n >= 1 && n <= 39) lastSeen[n] = i;
    }
  }
  const m = new Int16Array(40);
  for (let b = 1; b <= 39; b++) {
    m[b] = lastSeen[b] < 0 ? N : (N - lastSeen[b] - 1);
  }
  return m;
}

// 產生週開獎格式報表 HTML
function genWeekReport(flags, title) {
  const sections = [[1,8],[9,16],[17,24],[25,32],[33,39]];
  let h = `<div style="margin-bottom:8px">
    <div style="color:var(--gold);font-weight:600;font-size:11px;margin-bottom:4px">${title}</div>`;
  for (const [s, e] of sections) {
    const label = `${String(s).padStart(2,'0')}~${String(e).padStart(2,'0')}`;
    h += `<div style="display:flex;align-items:center;margin-bottom:2px">
      <span style="color:var(--text-muted);font-size:10px;min-width:40px;font-family:'JetBrains Mono',monospace">${label}</span>`;
    for (let i = s; i <= e; i++) {
      h += flags[i]
        ? `<span style="min-width:22px;text-align:center;font-size:11px;color:var(--accent2);font-weight:700;font-family:'JetBrains Mono',monospace">${String(i).padStart(2,'0')}</span>`
        : `<span style="min-width:22px"></span>`;
    }
    h += `</div>`;
  }
  return h + `</div>`;
}

function renderMissingTab() {
  const container = document.getElementById('tab3');
  if (!container) return;

  container.style.display = 'flex';
  container.style.flexDirection = 'column';

  // 第一次進入時建立骨架，之後只更新內容
  if (!document.getElementById('missingGrid')) {
    container.innerHTML = `
      <div style="display:flex;flex-direction:column;height:100%;min-height:0">
        <div style="padding:4px 8px;background:var(--panel2);border-bottom:1px solid var(--border);flex-shrink:0;font-size:11px;color:var(--text-muted)" id="missingStatus">計算中...</div>
        <div style="flex:1;overflow:auto;min-height:0" id="missingGrid"></div>
        <div style="border-top:1px solid var(--border);overflow-y:auto;padding:0;max-height:42%;flex-shrink:0" id="missingText"></div>
      </div>`;
  }

  // 捕捉當下 interestedIndex，避免 setTimeout 期間被更改
  const snapIndex = interestedIndex;
  document.getElementById('missingStatus').textContent = '計算中...';

  setTimeout(() => {
    // 若期間又切換了，跳過舊的計算
    if (snapIndex !== interestedIndex) return;
    try { buildMissingContent(); }
    catch(e) { document.getElementById('missingGrid').innerHTML = `<div style="color:#e05252;padding:10px">錯誤: ${e.message}</div>`; }
  }, 30);
}

function buildMissingContent() {
  const N = interestedIndex;
  if (N < 2) return;

  // ── 預計算所有期的遺漏數 (只用到 interestedIndex 範圍) ──
  const lastSeen = new Int32Array(40).fill(-1);
  // missingAt_local[i] = missing at draw i, computed fresh only in range [0..N-1]
  const missingAt = [];
  for (let i = 0; i < N; i++) {
    const m = new Int16Array(40);
    for (let b = 1; b <= 39; b++) {
      m[b] = lastSeen[b] < 0 ? i : (i - lastSeen[b] - 1);
    }
    missingAt.push(m);
    for (const n of records[i].nums) {
      if (n >= 1 && n <= 39) lastSeen[n] = i;
    }
  }
  // currentMissing = missing AFTER all N records (for the text panel)
  const currentMissing = new Int16Array(40);
  for (let b = 1; b <= 39; b++) {
    currentMissing[b] = lastSeen[b] < 0 ? N : (N - lastSeen[b] - 1);
  }

  const WEEK_CH = ['日','一','二','三','四','五','六'];

  // ── 左側：歷史格 ──
  const showCount = Math.min(200, N);
  let gridHtml = `<table style="border-collapse:collapse;font-size:11px;white-space:nowrap;width:100%">
  <thead><tr style="background:var(--panel2);position:sticky;top:0;z-index:2;border-bottom:1px solid var(--border)">
    <th style="padding:3px 8px;text-align:left;color:var(--text-dim);min-width:80px;border-right:1px solid var(--border)">日期</th>
    <th style="padding:3px 5px;text-align:center;color:var(--text-dim);border-right:1px solid var(--border)">周</th>
    <th style="padding:3px 8px;text-align:center;color:var(--text-dim)">N1</th>
    <th style="padding:3px 8px;text-align:center;color:var(--text-dim)">N2</th>
    <th style="padding:3px 8px;text-align:center;color:var(--text-dim)">N3</th>
    <th style="padding:3px 8px;text-align:center;color:var(--text-dim)">N4</th>
    <th style="padding:3px 8px;text-align:center;color:var(--text-dim)">N5</th>
    <th style="padding:3px 6px;text-align:center;color:var(--text-dim);border-left:1px solid var(--border)">回</th>
    <th style="padding:3px 6px;text-align:center;color:var(--text-dim)">開</th>
    <th style="padding:3px 6px;text-align:center;color:var(--text-dim)">生</th>
    <th style="padding:3px 6px;text-align:center;color:var(--text-dim)">開</th>
  </tr></thead><tbody>`;

  // 下期開獎 row
  gridHtml += `<tr style="background:rgba(58,123,213,0.2);border-bottom:1px solid var(--border)">
    <td colspan="2" style="padding:3px 8px;color:var(--accent);font-weight:700;font-size:12px">下期開獎</td>
    <td colspan="9"></td>
  </tr>`;

  for (let ri = N - 1; ri >= N - showCount; ri--) {
    const rec = records[ri];
    const d = new Date(rec.date.replace(/\//g,'-'));
    const dow = WEEK_CH[d.getDay()];
    const m = missingAt[ri];

    // 統計 回頭/生牌 for ALL 39 balls at this draw
    let m_回 = 0, m_生 = 0, m_回開 = 0, m_生開 = 0;
    for (let b = 1; b <= 39; b++) {
      const mv = m[b];
      if (mv <= 5) m_回++;
      if (mv > 10) m_生++;
    }

    // 每個開獎球的遺漏數
    const ballMV = rec.nums.map(n => {
      const mv = m[n] || 0;
      if (mv <= 5) m_回開++;
      if (mv > 10) m_生開++;
      return mv;
    });

    // 顏色：0=綠(剛開過), 1-5=暗, 6-10=金, >10=紅
    const mvColor = mv => mv === 0 ? '#6ee7b7' : mv <= 5 ? 'var(--text-dim)' : mv <= 10 ? 'var(--gold)' : '#e05252';
    const mvWeight = mv => mv > 10 ? '700' : '400';

    const isEven = (N - 1 - ri) % 2 === 0;
    gridHtml += `<tr data-ri="${ri}" onclick="buildMissingText(${ri})" style="cursor:pointer;${isEven ? '' : 'background:var(--panel2);'}border-bottom:1px solid rgba(255,255,255,0.03)" class="missing-row">
      <td style="padding:2px 8px;color:var(--text-dim);border-right:1px solid var(--border);font-size:11px">${rec.date}</td>
      <td style="padding:2px 5px;text-align:center;color:var(--text-muted);border-right:1px solid var(--border)">星期${dow}</td>
      ${ballMV.map(mv => `<td style="padding:2px 8px;text-align:center;color:${mvColor(mv)};font-weight:${mvWeight(mv)}">${mv}</td>`).join('')}
      <td style="padding:2px 6px;text-align:center;color:var(--text-muted);border-left:1px solid var(--border)">${m_回}</td>
      <td style="padding:2px 6px;text-align:center;color:var(--text-muted)">${m_回開}</td>
      <td style="padding:2px 6px;text-align:center;color:${m_生 > 15 ? '#e05252' : 'var(--text-muted)'}">${m_生}</td>
      <td style="padding:2px 6px;text-align:center;color:${m_生開 > 0 ? '#e05252' : 'var(--text-muted)'}">${m_生開}</td>
    </tr>`;
  }
  gridHtml += `</tbody></table>`;
  document.getElementById('missingGrid').innerHTML = gridHtml;
  document.getElementById('missingStatus').textContent =
    `顯示最近 ${showCount} 期 ｜ 當前基準: ${records[N-1].date}`;

  // 預設以 interestedIndex 為基準顯示下方分析
  // targetRI = N-1 對應「下期開獎」（分析截至最新期）
  buildMissingText(N - 1);
}

// ── 下方遺漏數文字分析（可獨立呼叫，對應 C# button2_Click）──
// targetRI: 點選的 record index，分析「截至 targetRI 那期為止」各球遺漏狀況
function buildMissingText(targetRI) {
  const el = document.getElementById('missingText');
  if (!el) return;

  // 高亮選中列
  document.querySelectorAll('.missing-row').forEach(r => r.style.outline = '');
  const selRow = document.querySelector(`.missing-row[data-ri="${targetRI}"]`);
  if (selRow) selRow.style.outline = '1px solid var(--accent2)';

  // targetRI 的下一期 = targetRI+1 時刻的遺漏狀況
  // 對應 C# button2_Click：target_index 那列的 elowValue
  // 計算截至 targetRI（含）的各球遺漏數
  const N2 = targetRI + 1; // 用前 N2 筆計算
  const lastSeen2 = new Int32Array(40).fill(-1);
  for (let i = 0; i < N2; i++) {
    for (const n of records[i].nums) if (n >= 1 && n <= 39) lastSeen2[n] = i;
  }
  const cm = new Int16Array(40); // currentMissing at targetRI
  for (let b = 1; b <= 39; b++) {
    cm[b] = lastSeen2[b] < 0 ? N2 : (N2 - lastSeen2[b] - 1);
  }

  // 點選的那期開獎球（用於標示 []）
  const drawnSet = new Set(records[targetRI].nums);

  // 判斷是否為「下期開獎」基準（targetRI = interestedIndex-1）
  const isNextDraw = (targetRI + 1) >= interestedIndex;

  let textHtml = `<div style="display:flex;gap:0;height:100%">
    <div style="flex:1;overflow-y:auto;padding:6px 8px;border-right:1px solid var(--border)">
      <div style="color:var(--accent2);font-weight:600;font-size:11px;margin-bottom:4px">遺漏數分析 <span style="color:var(--text-muted);font-weight:400">${records[targetRI].date}</span></div>`;

  let count = 0, m_回頭牌數 = 0;
  const 生牌群 = [];

  for (let i = 0; i <= 60; i++) {
    const balls = [];
    for (let b = 1; b <= 39; b++) {
      if (cm[b] === i) balls.push(b);
    }
    if (balls.length === 0) continue;

    const ballsHtml = balls.map(b => {
      return drawnSet.has(b)
        ? `<span style="color:var(--gold);font-weight:700">[${b}]</span>`
        : `<span style="color:var(--text)">${b}</span>`;
    }).join(' ,');

    textHtml += `<div style="font-size:11px;margin-bottom:1px;line-height:1.5">
      <span style="color:var(--text-muted);min-width:70px;display:inline-block">遺漏數 ${i} =&gt;</span>${ballsHtml}
    </div>`;

    count += balls.length;
    m_回頭牌數 += balls.length;
    for (const b of balls) if (i > 10) 生牌群.push(b);

    if (i === 5) {
      textHtml += `<div style="border-top:1px solid var(--border);margin:3px 0;padding-top:3px;color:var(--accent2);font-size:10px;font-weight:600">── 回頭牌 ${m_回頭牌數} 支 ──</div>`;
    }
    if (i === 10) {
      textHtml += `<div style="border-top:1px solid var(--border);margin:3px 0;padding-top:3px;color:var(--gold);font-size:10px;font-weight:600">── 生牌=剩下 ${39 - count} 支 ──</div>`;
    }
  }

  生牌群.sort((a,b)=>a-b);
  textHtml += `</div>
    <div style="flex:1;overflow-y:auto;padding:6px 8px">
      <div style="padding:5px;background:var(--panel2);border:1px solid var(--border);border-radius:4px;font-size:11px;margin-bottom:6px">
        <div style="color:var(--gold);font-weight:600;margin-bottom:2px">生牌群:</div>
        <div style="color:var(--text);line-height:1.7">${生牌群.map(b=>String(b).padStart(2,'0')).join(' ,')}</div>
      </div>`;

  // 週報：以 targetRI 那期日期為基準
  const baseDate = new Date(records[targetRI].date.replace(/\//g,'-'));
  let lastSundayDate;
  // 下期開獎（targetRI 是最後一筆）：baseDate 當天若是日則取自身，否則往前找
  if (isNextDraw) {
    const dow2 = baseDate.getDay();
    lastSundayDate = new Date(baseDate);
    if (dow2 !== 0) lastSundayDate.setDate(lastSundayDate.getDate() - dow2);
  } else {
    let diff = baseDate.getDay();
    if (diff === 0) diff = 7;
    lastSundayDate = new Date(baseDate);
    lastSundayDate.setDate(lastSundayDate.getDate() - diff);
  }
  const lwMon = new Date(lastSundayDate); lwMon.setDate(lwMon.getDate()-6);
  const twMon = new Date(lastSundayDate); twMon.setDate(twMon.getDate()+1);
  const twEnd = isNextDraw ? baseDate : new Date(baseDate.getTime() - 86400000);

  const lwFlags = new Array(40).fill(false);
  const twFlags = new Array(40).fill(false);
  for (let i = 0; i < N2; i++) {
    const d = new Date(records[i].date.replace(/\//g,'-'));
    if (d >= lwMon && d <= lastSundayDate) for (const n of records[i].nums) if (n>=1&&n<=39) lwFlags[n]=true;
    if (d >= twMon && d <= twEnd)          for (const n of records[i].nums) if (n>=1&&n<=39) twFlags[n]=true;
  }
  textHtml += `<div style="display:flex;gap:4px">`;
  textHtml += `<div style="flex:1">` + genWeekReport(lwFlags, '上週開獎號') + `</div>`;
  textHtml += `<div style="flex:1">` + genWeekReport(twFlags, '本週開獎號') + `</div>`;
  textHtml += `</div></div></div>`;

  el.innerHTML = textHtml;

// ============================================================
// FULL CALC TRIGGER
// ============================================================
function runAllCalc() {
  renderTailStats();
  calcBallFreq();
  const tab1 = document.getElementById('tab1');
  if (tab1 && tab1.style.display !== 'none') renderVersionTab();
  const tab2 = document.getElementById('tab2');
  if (tab2 && tab2.style.display !== 'none') renderObserveTab();
  const tab3 = document.getElementById('tab3');
  if (tab3 && tab3.style.display !== 'none') renderMissingTab();
}

// ============================================================
// TAB SWITCH
// ============================================================
function switchTab(idx) {
  for (let i=0;i<4;i++) {
    document.getElementById('tab'+i).style.display = i===idx ? 'flex' : 'none';
    document.getElementById('tabBtn'+i).classList.toggle('active', i===idx);
  }
  if (idx === 1) renderVersionTab();
  if (idx === 2) renderObserveTab();
  if (idx === 3) renderMissingTab();
}
// 頁面啟動自動載入 tw539.csv
window.addEventListener('DOMContentLoaded', () => {
  fetch('tw539.csv')
    .then(r => { if (!r.ok) throw new Error('找不到 tw539.csv'); return r.text(); })
    .then(text => {
      parseCSVText(text, '539');
      document.getElementById('btn539').classList.add('primary');
      document.getElementById('btnTiantian').classList.remove('primary');
    })
    .catch(() => {
      document.getElementById('statusBar').textContent = '請手動選擇 CSV';
    });
});
</script>
