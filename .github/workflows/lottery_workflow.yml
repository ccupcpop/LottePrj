name: Lottery Analysis

on:
  schedule:
    # 台灣時間晚上 9:30 (UTC 13:30)
    - cron: '30 13 * * *'
    # 台灣時間中午 12:00 (UTC 04:00)
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      csv_file:
        description: 'CSV file to use'
        required: true
        default: 'tw539.csv'
        type: choice
        options:
          - tw539.csv
          - us539.csv

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas numpy

      - name: Determine CSV file based on schedule
        id: config
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "csv_file=${{ github.event.inputs.csv_file }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "30 13 * * *" ]; then
            echo "csv_file=tw539.csv" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 4 * * *" ]; then
            echo "csv_file=us539.csv" >> $GITHUB_OUTPUT
          fi

          # 設定郵件標題
          CSV="${{ github.event.inputs.csv_file }}"
          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            if [ "${{ github.event.schedule }}" = "30 13 * * *" ]; then
              CSV="tw539.csv"
            else
              CSV="us539.csv"
            fi
          fi
          if [ "$CSV" = "tw539.csv" ]; then
            echo "title=台彩539" >> $GITHUB_OUTPUT
          else
            echo "title=加州天天" >> $GITHUB_OUTPUT
          fi

      - name: Patch dragnumber.py with correct CSV
        run: |
          sed -i "s|CSV_FILENAME = '.*'|CSV_FILENAME = '${{ steps.config.outputs.csv_file }}'|" dragnumber.py

      - name: Patch position_analysis_txt.py with correct CSV
        run: |
          CSV_NAME="${{ steps.config.outputs.csv_file }}"
          sed -i "s|csv_file = os.path.join(script_dir, '.*')|csv_file = os.path.join(script_dir, '${CSV_NAME}')|" position_analysis_txt.py

      - name: Run dragnumber.py
        run: python dragnumber.py

      - name: Run position_analysis_txt.py
        run: python position_analysis_txt.py

      - name: List output files
        run: |
          echo "=== drag_output ==="
          ls -la drag_output/ 2>/dev/null || echo "(empty)"
          echo "=== position_output ==="
          ls -la position_output/ 2>/dev/null || echo "(empty)"

      - name: Send email with results
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "${{ steps.config.outputs.title }}分析報告"
          to: ccupcpop@gmail.com,nicpyq520@gmail.com
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            ${{ steps.config.outputs.title }} 分析報告
            
            請查看附件。
          attachments: |
            drag_output/*.txt
            position_output/*.txt

      - name: Commit output files to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tw539.csv us539.csv drag_output/*.txt position_output/*.txt
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Auto update analysis results - ${{ steps.config.outputs.csv_file }} $(date -u +%Y%m%d_%H%M%S)"
          git push